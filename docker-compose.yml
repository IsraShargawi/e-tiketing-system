version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eticketing-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Admin12345@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Admin12345@Passw0rd' -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - eticketing-network

  # .NET API
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: eticketing-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ETicketingDB;User Id=sa;Password=Admin12345@Passw0rd;TrustServerCertificate=True;
    ports:
      - "5000:80"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - eticketing-network
    restart: on-failure

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eticketing-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - eticketing-network

volumes:
  sqlserver_data:

networks:
  eticketing-network:
    driver: bridge
